name: Fetch Match Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      slack_test:
        description: 'Stuur een test bericht naar Slack'
        required: false
        default: 'false'

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch wedstrijden van API
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TEST: ${{ github.event.inputs.slack_test }}
        run: |
          pip install requests -q
          python3 fetch_matches.py

      - name: Commit en push data
        run: |
          git config user.name "Match Bot"
          git config user.email "bot@match-monitor"
          git add matches.json known_matches.json logo_map.json logos/ || true
          git diff --staged --quiet || git commit -m "Update wedstrijddata en logo's"
          git push
